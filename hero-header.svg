<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 300" width="800" height="300" preserveAspectRatio="xMidYMid meet" role="img" aria-labelledby="svgTitle svgDesc">
  
  <!-- ========================================== -->
  <!-- Metadata & Accessibility                   -->
  <!-- ========================================== -->
  <title id="svgTitle">Aman Chapadiya - GitHub Hero Header</title>
  <desc id="svgDesc">A premium, minimalist GitHub profile header for Aman Chapadiya, Software Engineer from Gurugram, India.</desc>

  <!-- ========================================== -->
  <!-- Definitions                                -->
  <!-- ========================================== -->
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="backgroundGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0B0B0E" />
      <stop offset="100%" stop-color="#141418" />
    </linearGradient>

    <!-- Base Styles -->
    <style>
      .primary-text {
        font-family: 'Segoe UI', Helvetica, Arial, sans-serif;
        font-size: 56px;
        font-weight: 700;
        fill: #F8F9FB;
        text-anchor: middle;
      }
      .subtitle-text {
        font-family: 'Segoe UI', Helvetica, Arial, sans-serif;
        font-size: 13px;
        font-weight: 500;
        fill: #A7ABB5;
        letter-spacing: 2px;
        text-anchor: middle;
      }
      .accent-line {
        stroke: #DC2626;
        stroke-width: 2px;
        stroke-linecap: round;
      }
      .corner-decoration {
        stroke: #A7ABB5;
        stroke-width: 1.5px;
        stroke-linecap: round;
        stroke-linejoin: round;
        fill: none;
        opacity: 0.3;
      }
    </style>
  </defs>

  <!-- ========================================== -->
  <!-- Background                                 -->
  <!-- ========================================== -->
  <g id="backgroundLayer" aria-hidden="true">
    <rect width="800" height="300" fill="url(#backgroundGradient)" />
  </g>

  <!-- ========================================== -->
  <!-- Decorations                                -->
  <!-- ========================================== -->
  <g id="decorationsLayer" aria-hidden="true">
    <!-- Top Left Corner -->
    <g id="cornerLeft">
      <path class="corner-decoration" d="M 56 32 L 32 32 L 32 56" />
    </g>
    
    <!-- Bottom Right Corner -->
    <g id="cornerRight">
      <path class="corner-decoration" d="M 744 268 L 768 268 L 768 244" />
    </g>
  </g>

  <!-- ========================================== -->
  <!-- Content                                    -->
  <!-- ========================================== -->
  <g id="contentLayer">
    
    <!-- Primary Title -->
    <g id="titleGroup">
      <text id="titleText" x="400" y="134" class="primary-text">Aman Chapadiya</text>
    </g>

    <!-- Accent Line -->
    <g id="accentGroup" aria-hidden="true">
      <line id="accentLine" x1="216" y1="166" x2="584" y2="166" class="accent-line" />
    </g>

    <!-- Subtitle -->
    <g id="subtitleGroup">
      <text id="subtitleText" x="400" y="206" class="subtitle-text">SOFTWARE ENGINEER • GURUGRAM, INDIA</text>
    </g>
    
  </g>
</svg>
